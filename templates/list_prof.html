{% extends "base.html" %}

{% block content %}
    <h2>Список профессий</h2>
    {% if list_type == 'ol' %}
        <ol>
        {% for p in profs %}
            <li>{{ p }}</li>
        {% endfor %}
        </ol>
    {% elif list_type == 'ul' %}
        <ul>
        {% for p in profs %}
            <li>{{ p }}</li>
        {% endfor %}
        </ul>
    {% else %}
        <div>Неверный параметр</div>
    {% endif %}
{% endblock %}
